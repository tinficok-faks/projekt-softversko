version: '3.8'

services:
  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./ticketing.db
      - DEBUG=False
    volumes:
      - ./backend/ticketing.db:/app/ticketing.db
      - ./backend/uploads:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - helpdesk-network

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    depends_on:
      - backend
    networks:
      - helpdesk-network
    # Ako frontend treba slati upite na specifičan URL preko env. varijable, 
    # Vite iz dockera pristupa backendu preko localhost:8000 iz browsera korisnika
    environment:
      - VITE_API_URL=http://localhost:8000

networks:
  helpdesk-network:
    driver: bridge
