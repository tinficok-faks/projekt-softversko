version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=sqlite:///./ticketing.db
      - DEBUG=False
    volumes:
      - ./ticketing.db:/app/ticketing.db
      - ./uploads:/app/uploads
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    networks:
      - helpdesk-network

networks:
  helpdesk-network:
    driver: bridge
